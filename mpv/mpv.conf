#Profile
profile=high-quality

#General

#Always open the video player in full screen
fullscreen=yes
#Don't close the player after finishing the video
keep-open=yes
#The last position of your video is saved when quitting mpv
save-position-on-quit=yes
#Start mpv with a % smaller resolution of your screen
autofit=50%
#Force seeking (if seeking doesn't work)
#force-seekable=yes
#Cursor hide in ms
cursor-autohide=100
#Generate a playlist from same files in the same directory
autocreate-playlist=same
#Disable the whole OSD (if you use an external one like uosc)
osc=no
#Disable the Windows border of mpv
border=no


#Video output driver
#See: https://github.com/mpv-player/mpv/wiki/GPU-Next-vs-GPU
vo=gpu-next
#Called API
gpu-api=vulkan
#Hardware decoding
hwdec=nvdec
target-colorspace-hint=yes
target-constrast=auto

#Audio
#Default volume of the player
volume=100
#Max volume of the player
volume-max=150
audio-channels=auto-safe

[Deband]
deband=yes
deband-iterations=2
deband-threshold=32
deband-range=16
deband-grain=0

